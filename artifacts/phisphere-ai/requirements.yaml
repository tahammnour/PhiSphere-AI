packages:
  "framer-motion": "For smooth dialog and layout animations"
  "clsx": "For merging tailwind classes safely"
  "tailwind-merge": "For merging tailwind classes safely"
  "date-fns": "For formatting dates in the chat and sidebar"
  "react-markdown": "To render the structured AI markdown responses beautifully"
  "remark-gfm": "To support tables and lists in markdown"

images:
  - path: "artifacts/phisphere-ai/public/images/logo.png"
    description: "Minimalist geometric icon in glowing teal and deep navy, abstract sphere or molecule with scientific precision, transparent background"
    aspect_ratio: "1:1"
  - path: "artifacts/phisphere-ai/public/images/empty-state.png"
    description: "Abstract 3D rendering of a glowing teal data sphere in a dark navy void, scientific and premium aesthetic"
    aspect_ratio: "16:9"

notes:
  - API responses generated by orval from OpenAPI return raw data types (not wrapped in {data: ...})
  - SSE Streaming handled natively using fetch and ReadableStream
  - Lab Sessions and Conversations are mapped loosely by title (conversation.title === `LabSession:${session.id}`)
